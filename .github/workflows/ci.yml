      #     IMAGE=ghcr.io/${{ github.repository }}/smart-csv-runner
      #     VERSION=${GITHUB_REF_NAME#v}
      #     docker tag smart-csv-runner:latest "$IMAGE:$VERSION"
      #     docker tag smart-csv-runner:latest "$IMAGE:latest"
      #     docker push "$IMAGE:$VERSION"
